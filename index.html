<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <span class="icon">🌡️</span>
                <h1>TempPro</h1>
            </div>
            <p class="tagline">Instant temperature conversions across all scales</p>
        </header>

        <!-- Main Converter -->
        <main>
            <div class="converter-card">
                <!-- Input Section -->
                <div class="input-section">
                    <label for="temperatureInput">
                        <span>Enter Temperature</span>
                        <span class="hint">numeric value only</span>
                    </label>
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="temperatureInput" 
                            placeholder="e.g., 25.5" 
                            autocomplete="off"
                            value="25"
                        >
                        <span class="unit-badge" id="inputUnitBadge">°C</span>
                    </div>
                </div>

                <!-- Scale Selection -->
                <div class="scale-selection">
                    <span class="selection-label">Input Scale</span>
                    <div class="radio-group">
                        <label class="radio-card">
                            <input type="radio" name="scale" value="C" checked>
                            <span class="radio-label">°C</span>
                            <span class="radio-sub">Celsius</span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="scale" value="F">
                            <span class="radio-label">°F</span>
                            <span class="radio-sub">Fahrenheit</span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="scale" value="K">
                            <span class="radio-label">K</span>
                            <span class="radio-sub">Kelvin</span>
                        </label>
                    </div>
                </div>

                <!-- Convert Button -->
                <button class="convert-btn" id="convertBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9"/>
                    </svg>
                    Convert Temperature
                </button>

                <!-- Error Display -->
                <div class="error-message" id="errorMsg">
                    <span class="error-icon">⚠️</span>
                    <span id="errorText">Please enter a valid number</span>
                </div>
            </div>

            <!-- Results Section -->
            <div class="results-panel" id="resultsPanel">
                <div class="results-header">
                    <span class="results-title">Conversion Results</span>
                    <span class="results-badge">all scales</span>
                </div>
                <div class="results-grid">
                    <div class="result-item celsius">
                        <span class="result-unit">°C</span>
                        <span class="result-value" id="celsiusResult">—</span>
                    </div>
                    <div class="result-item fahrenheit">
                        <span class="result-unit">°F</span>
                        <span class="result-value" id="fahrenheitResult">—</span>
                    </div>
                    <div class="result-item kelvin">
                        <span class="result-unit">K</span>
                        <span class="result-value" id="kelvinResult">—</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <p>Precision temperature conversion &bull; instant &bull; accurate</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
